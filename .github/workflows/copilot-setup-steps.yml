name: 'Copilot Setup Steps'

on: workflow_dispatch

jobs:
  # The job MUST be called `copilot-setup-steps` or it will not be picked up by Copilot.
  copilot-setup-steps:
    runs-on: ubuntu-latest

    # Set the permissions to the lowest permissions possible needed for your steps.
    # Copilot will be given its own token for its operations.
    permissions:
      contents: read

    env:
      # Prevent stack overflows from hanging
      TS_GO_DEBUG_STACK_LIMIT: 5000000

    # These steps prepare the environment before Copilot starts.
    steps:
      - uses: jlumbroso/free-disk-space@54081f138730dfa15788a46383842cd2f914a1be # v1.3.1
        with:
          large-packages: false
          docker-images: false
          swap-storage: false
          dotnet: false

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          submodules: true

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '22.16.0'

      - uses: ./.github/actions/setup-go

      - run: npm i -g @playwright/mcp@0.0.28

      - run: go install golang.org/x/tools/gopls@v0.20.0

      - run: npm ci
